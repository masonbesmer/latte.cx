services:
  latte-cx:
    build:
      context: .
      dockerfile: Dockerfile
    image: latte-cx:local
    container_name: latte-cx
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
